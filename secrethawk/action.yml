name: "SecretHawk Secret Scan"
description: "Defensive Git secret scanning. Scan repositories you own and upload SARIF to GitHub code scanning."
author: "SecretHawk Maintainers"
branding:
  icon: "shield"
  color: "purple"

inputs:
  path:
    description: "Path to scan (defaults to the checked-out repo root)."
    required: false
    default: "."
  output:
    description: "SARIF output file path."
    required: false
    default: "results.sarif"
  python-version:
    description: "Python version to use."
    required: false
    default: "3.11"
  fail-on-findings:
    description: "Fail the action when secrets are found."
    required: false
    default: "true"

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install SecretHawk
      shell: bash
      # Pass untrusted/context values through env to avoid script injection.
      env:
        ACTION_PATH: ${{ github.action_path }}
      run: |
        python -m pip install --upgrade pip
        # Install from this action's directory (the package lives alongside action.yml).
        python -m pip install "$ACTION_PATH"

    - name: Run SecretHawk scan
      id: scan
      shell: bash
      # Pass untrusted/context values through env to avoid script injection.
      env:
        SCAN_PATH: ${{ inputs.path }}
        SCAN_OUTPUT: ${{ inputs.output }}
        FAIL_ON_FINDINGS: ${{ inputs.fail-on-findings }}
      run: |
        if [ "$FAIL_ON_FINDINGS" = "true" ]; then
          FAIL_FLAG="--fail-on-findings"
        else
          FAIL_FLAG="--no-fail-on-findings"
        fi
        # Always produce the SARIF file; capture exit code for the gate.
        set +e
        secrethawk scan "$SCAN_PATH" \
          --format sarif \
          --output "$SCAN_OUTPUT" \
          $FAIL_FLAG
        echo "exit_code=$?" >> "$GITHUB_OUTPUT"
        set -e

    - name: Upload SARIF to GitHub code scanning
      if: always()
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: ${{ inputs.output }}

    - name: Enforce scan result
      if: ${{ inputs.fail-on-findings == 'true' }}
      shell: bash
      env:
        SCAN_EXIT_CODE: ${{ steps.scan.outputs.exit_code }}
      run: |
        if [ "$SCAN_EXIT_CODE" != "0" ]; then
          echo "SecretHawk found potential secrets. Review the Security tab."
          exit 1
        fi
